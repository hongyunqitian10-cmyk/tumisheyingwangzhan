收集的信息类型：
• 账户信息：姓名、邮箱、电话号码
• 设备信息：IP地址、浏览器类型、操作系统
• 使用数据：登录时间、访问的功能、交互模式

信息使用：
我们使用收集的信息来：
• 提供和改进服务
• 验证用户身份
• 检测和防止欺诈
• 发送重要通知
• 遵守法律义务

信息共享：
